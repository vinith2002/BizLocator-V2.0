spring.application.name=business-locator

# H2 Database
spring.datasource.url=jdbc:h2:mem:businessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# OpenStreetMap Nominatim
nominatim.base-url=https://nominatim.openstreetmap.org/search

# Logging
logging.level.com.businesslocator=DEBUG
